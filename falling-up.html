<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falling Up</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #060610;
    }

    .scene {
      position: relative;
      width: 480px;
      aspect-ratio: 3 / 4;
    }

    .base {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .base img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #spirit {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      will-change: transform, clip-path;
      animation: ascend 7s cubic-bezier(0.33, 0, 0.2, 1) infinite;
    }

    @keyframes ascend {
      0%, 5% {
        transform: translateY(0%);
        clip-path: inset(0 0 100% 0);
      }
      45%, 65% {
        transform: translateY(-45%);
        clip-path: inset(0 0 55% 0);
      }
      100% {
        transform: translateY(0%);
        clip-path: inset(0 0 100% 0);
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="base">
      <img src="falling-up.jpeg" alt="Original">
    </div>
    <canvas id="spirit"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('spirit');
    const ctx = canvas.getContext('2d');
    const img = new Image();

    img.onload = () => {
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;

      ctx.filter = 'hue-rotate(160deg) saturate(1.5) brightness(1.1)';
      ctx.drawImage(img, 0, 0);
      ctx.filter = 'none';

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const d = imageData.data;

      for (let i = 0; i < d.length; i += 4) {
        const lum = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
        if (lum < 45) {
          d[i + 3] = 0;
        } else if (lum < 90) {
          d[i + 3] = Math.round(((lum - 45) / 45) * 255);
        }
      }

      ctx.putImageData(imageData, 0, 0);
    };

    img.src = 'falling-up.jpeg';
  </script>
</body>
</html>
